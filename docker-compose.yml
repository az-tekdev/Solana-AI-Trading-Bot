version: '3.8'

services:
  trading-bot:
    build: .
    container_name: solana-ai-trading-bot
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: python main.py simulate --token So11111111111111111111111111111111111111112
